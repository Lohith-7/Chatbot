<!DOCTYPE html>
<html>
<head>
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">
    <h2>🩺 Medical Assistant</h2>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Describe your symptoms...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
let isSending = false; // prevent double requests

async function sendMessage() {
    if (isSending) return;

    let input = document.getElementById("message");
    let msg = input.value.trim(); // trim input

    if (!msg) return;

    let chatBox = document.getElementById("chat-box");

    // User message
    chatBox.innerHTML += `<p><b>You:</b> ${msg}</p>`;
    input.value = "";

    // Typing indicator
    let typingId = "typing-" + Date.now();
    chatBox.innerHTML += `<p id="${typingId}"><b>Bot:</b> Typing...</p>`;

    chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: "smooth"
    });

    isSending = true;

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: msg})
        });

        let data = await res.json();

        // Remove typing safely
        let typingElem = document.getElementById(typingId);
        if (typingElem) typingElem.remove();

        // Bot response
        chatBox.innerHTML += `<p><b>Bot:</b> ${data.response}</p>`;

    } catch (err) {
        let typingElem = document.getElementById(typingId);
        if (typingElem) typingElem.remove();

        chatBox.innerHTML += `<p><b>Bot:</b> Error connecting</p>`;
    }

    isSending = false;

    chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: "smooth"
    });

    input.focus(); // keep focus
}

// Enter to send
document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

// Focus on page load
document.getElementById("message").focus();
</script>

</body>
</html>
